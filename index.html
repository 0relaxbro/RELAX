<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RELAX V3 FULL</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI,Arial,sans-serif;
}

body{
    background:#080b12;
    color:#e8edf5;
    height:100vh;
    overflow:hidden;
}


/* ANA PANEL */

.app{
    width:100%;
    height:100vh;
    display:flex;
    flex-direction:column;
}


/* HEADER */

.header{
    height:65px;
    background:#111827;
    border-bottom:1px solid #263246;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 25px;
}


.logo{
    font-size:24px;
    font-weight:700;
    color:#00e5ff;
    letter-spacing:2px;
}


.status{
    display:flex;
    gap:10px;
    align-items:center;
}


.dot{
    width:12px;
    height:12px;
    background:#00ff88;
    border-radius:50%;
}


.status span{
    color:#9ca3af;
}


/* CONTENT */

.content{
    flex:1;
    display:flex;
    overflow:hidden;
}


/* SIDEBAR */

.sidebar{

    width:230px;
    background:#0d1320;
    border-right:1px solid #263246;
    padding:20px;

}


.menu{

    margin-top:20px;

}


.menu button{

    width:100%;
    margin-bottom:12px;
    padding:13px;

    background:#172033;
    border:1px solid #263246;
    color:#dbeafe;

    cursor:pointer;
    border-radius:8px;

    transition:.2s;

}


.menu button:hover{

    background:#00bcd4;
    color:#000;

}



/* MAIN */

.main{

    flex:1;
    padding:20px;
    overflow:auto;

}



/* CARDS */

.cards{

    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:15px;

}


.card{

    background:#111827;
    border:1px solid #263246;
    border-radius:12px;
    padding:20px;

}


.card h3{

    color:#94a3b8;
    font-size:14px;

}


.card p{

    font-size:28px;
    margin-top:10px;
    color:#00e5ff;

}



/* PANEL */

.panel{

    margin-top:20px;
    background:#111827;
    border:1px solid #263246;
    border-radius:12px;
    padding:20px;

}


.panel-title{

    font-size:18px;
    color:#00e5ff;
    margin-bottom:15px;

}



/* RESPONSIVE */

@media(max-width:900px){

.cards{

grid-template-columns:repeat(2,1fr);

}

.sidebar{

width:180px;

}

}


</style>

</head>


<body>


<div class="app">


<header class="header">

<div class="logo">
RELAX V3 FULL
</div>


<div class="status">

<div class="dot"></div>

<span>
SYSTEM ONLINE
</span>

</div>


</header>



<div class="content">


<aside class="sidebar">


<div class="menu">

<button>
Dashboard
</button>


<button>
Signals
</button>


<button>
Scanner
</button>


<button>
Risk Manager
</button>


<button>
Logs
</button>


<button>
Settings
</button>


</div>


</aside>




<main class="main">


<div class="cards">


<div class="card">

<h3>
BTC PRICE
</h3>

<p id="btc">
-- 
</p>

</div>



<div class="card">

<h3>
SIGNAL
</h3>

<p id="signal">
WAIT
</p>

</div>



<div class="card">

<h3>
POSITION
</h3>

<p id="position">
NONE
</p>

</div>



<div class="card">

<h3>
PROFIT
</h3>

<p id="profit">
0%
</p>

</div>


</div>




<div class="panel">

<div class="panel-title">
RELAX ENGINE LOG
</div>


<div id="log">

System initialized...

</div>


</div>



</main>



</div>


</div>


<script>


const logBox=document.getElementById("log");


function addLog(text){

let time=new Date().toLocaleTimeString();

logBox.innerHTML += 
"<br>["+time+"] "+text;

}


addLog("RELAX V3 FULL loading...");
addLog("Core interface ready");


</script>


</body>

</html>

<style>

.workspace{

display:none;

}


.workspace.active{

display:block;

}



.section-title{

font-size:20px;
color:#00e5ff;
margin-bottom:15px;

}



.grid-box{

display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;

}



.info-box{

background:#172033;
border:1px solid #263246;
padding:18px;
border-radius:10px;

}



.info-box span{

display:block;
color:#94a3b8;
font-size:13px;

}



.info-box strong{

display:block;
font-size:24px;
margin-top:8px;
color:#00e5ff;

}



.engine-panel{

margin-top:20px;
background:#111827;
border:1px solid #263246;
padding:20px;
border-radius:12px;

}



.engine-row{

display:flex;
justify-content:space-between;
padding:12px;
background:#172033;
border-radius:8px;
margin-bottom:10px;

}


</style>



<script>


// RELAX V3 CORE STATE


const RELAX = {


version:"V3 FULL",

status:"ONLINE",

engine:false,

signal:"WAIT",

position:"NONE",

risk:0


};



function relaxUpdate(){

console.log("RELAX ENGINE",RELAX);

}



relaxUpdate();



function relaxStatus(text){

let log=document.getElementById("log");

if(log){

let time=new Date().toLocaleTimeString();

log.innerHTML +=
"<br>["+time+"] "+text;

}

}



relaxStatus("V3 Core loaded");

relaxStatus("System architecture ready");


</script>
