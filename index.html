<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html{

scroll-behavior:smooth;

}

body{

background:#060912;

font-family:Inter,sans-serif;

color:white;

overflow-x:hidden;

}

/***************************
BACKGROUND
****************************/

.background{

position:fixed;

inset:0;

z-index:-5;

background:

radial-gradient(circle at top,#2647a8 0%,transparent 35%),

radial-gradient(circle at bottom,#6628b8 0%,transparent 30%),

#05070e;

overflow:hidden;

}

.blur1{

position:absolute;

width:650px;

height:650px;

left:-220px;

top:-180px;

background:#2d7fff;

opacity:.18;

filter:blur(140px);

border-radius:50%;

}

.blur2{

position:absolute;

width:550px;

height:550px;

right:-180px;

bottom:-150px;

background:#7b32ff;

opacity:.15;

filter:blur(150px);

border-radius:50%;

}

/***************************
NAVBAR
****************************/

nav{

width:100%;

position:fixed;

top:0;

left:0;

display:flex;

justify-content:space-between;

align-items:center;

padding:22px 60px;

backdrop-filter:blur(18px);

background:rgba(8,12,22,.35);

border-bottom:1px solid rgba(255,255,255,.05);

z-index:999;

}

.logoText{

font-family:Orbitron;

font-size:24px;

font-weight:900;

letter-spacing:2px;

}

.menu{

display:flex;

gap:30px;

}

.menu a{

text-decoration:none;

color:#d7d7d7;

transition:.3s;

font-size:15px;

}

.menu a:hover{

color:#67b2ff;

}

/***************************
HERO
****************************/

.hero{

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

padding:120px 30px 50px;

}

.heroBox{

max-width:1200px;

width:100%;

display:flex;

justify-content:space-between;

align-items:center;

gap:70px;

}

.left{

flex:1;

}

.left h1{

font-size:88px;

font-family:Orbitron;

line-height:1;

margin-bottom:20px;

}

.left h2{

font-size:33px;

font-weight:300;

color:#7bb8ff;

margin-bottom:15px;

}

.left p{

font-size:20px;

line-height:1.8;

color:#d6d6d6;

max-width:600px;

}

.buttons{

display:flex;

gap:18px;

margin-top:45px;

flex-wrap:wrap;

}

.btn{

padding:16px 34px;

border-radius:14px;

text-decoration:none;

font-weight:700;

transition:.3s;

}

.buy{

background:#3b7cff;

color:white;

box-shadow:0 0 30px rgba(59,124,255,.45);

}

.buy:hover{

transform:translateY(-4px);

box-shadow:0 0 40px rgba(59,124,255,.8);

}

.chart{

background:rgba(255,255,255,.08);

backdrop-filter:blur(15px);

color:white;

border:1px solid rgba(255,255,255,.08);

}

.chart:hover{

background:rgba(255,255,255,.13);

}

.right{

flex:1;

display:flex;

justify-content:center;

}

.coin{

width:430px;

max-width:95%;

border-radius:50%;

box-shadow:

0 0 80px rgba(79,139,255,.35),

0 0 160px rgba(90,57,255,.18);

animation:float 4s ease-in-out infinite;

}

@keyframes float{

0%{transform:translateY(0px);}
50%{transform:translateY(-14px);}
100%{transform:translateY(0px);}

}

@media(max-width:950px){

.heroBox{

flex-direction:column-reverse;

text-align:center;

}

.left h1{

font-size:60px;

}

.left p{

margin:auto;

}

.buttons{

justify-content:center;

}

nav{

padding:20px;

}

.menu{

display:none;

}

}
