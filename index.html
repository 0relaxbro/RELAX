<!DOCTYPE html>
<html lang="tr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RELAX V3 FULL</title>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:Arial, sans-serif;
}


body{

background:#080b12;
color:white;
height:100vh;
overflow:hidden;

}


.app{

height:100vh;
display:flex;
flex-direction:column;

}



.header{

height:65px;
background:#111827;
border-bottom:1px solid #263246;

display:flex;
align-items:center;
justify-content:space-between;

padding:0 25px;

}


.logo{

font-size:24px;
font-weight:bold;
color:#00e5ff;

}



.status{

color:#00ff88;

}



.container{

flex:1;
display:flex;

}



.sidebar{

width:220px;
background:#0d1320;
border-right:1px solid #263246;
padding:20px;

}



.sidebar button{

width:100%;
padding:12px;
margin-bottom:10px;

background:#172033;
border:1px solid #263246;

color:white;
border-radius:8px;

cursor:pointer;

}



.main{

flex:1;
padding:20px;

}



.card-area{

display:grid;
grid-template-columns:repeat(4,1fr);
gap:15px;

}



.card{

background:#111827;
border:1px solid #263246;
border-radius:12px;

padding:20px;

}


.card h3{

font-size:13px;
color:#94a3b8;

}



.card span{

display:block;
font-size:25px;
margin-top:10px;
color:#00e5ff;

}



.panel{

margin-top:20px;
background:#111827;

border:1px solid #263246;

border-radius:12px;

padding:20px;

}



</style>

</head>


<body>


<div class="app">


<div class="header">

<div class="logo">
RELAX V3 FULL
</div>


<div class="status">
● ONLINE
</div>


</div>



<div class="container">


<div class="sidebar">

<button>Dashboard</button>

<button>Signals</button>

<button>Scanner</button>

<button>Risk</button>

<button>Logs</button>

<button>Settings</button>


</div>



<div class="main">


<div class="card-area">


<div class="card">

<h3>BTC PRICE</h3>

<span id="btc">--</span>

</div>



<div class="card">

<h3>SIGNAL</h3>

<span id="signal">WAIT</span>

</div>



<div class="card">

<h3>POSITION</h3>

<span id="position">NONE</span>

</div>



<div class="card">

<h3>PROFIT</h3>

<span id="profit">0%</span>

</div>


</div>



<div class="panel">

<h2>
RELAX ENGINE LOG
</h2>

<br>

<div id="log">

System Ready...

</div>


</div>


</div>


</div>


</div>
