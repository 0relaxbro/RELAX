<script>
/* =========================================================
   PROVEN LIBRARY CODE — copied verbatim from the admin tool /
   test harness. See SWAP_V2_MIGRATION_PLAN.md for what's been
   confirmed against real devnet transactions.
   ========================================================= */

/* =========================================================
   Keccak-256 + Merkle helpers (AllowList guard)
   =========================================================
   REPLACES the previous crypto.subtle SHA-256 helper. That was wrong:
   Candy Guard's AllowList uses solana_program::keccak, i.e. ORIGINAL
   Keccak-256 (padding byte 0x01), not SHA-256 and not SHA3-256
   (padding 0x06). WebCrypto offers neither, so this is a compact
   self-contained implementation, verified against the standard
   vectors before being wired in:
     keccak256("")    = c5d2460186f7233c927e7db2dcc703c0e500b653ca82273b7bfad8045d85a470
     keccak256("abc") = 4e03657aea45a94fc7d47ba826c8d667c0d1e6e33a64a036ec44f58fa12d6c45
   Both are asserted at load time by selfTest() below, so a broken
   build fails loudly on page load instead of as a confusing
   "invalid proof" error after a wallet signature.
   ========================================================= */
const RelaxKeccak = (function () {
	const RC = [
		[0x00000000,0x00000001],[0x00000000,0x00008082],[0x80000000,0x0000808a],[0x80000000,0x80008000],
		[0x00000000,0x0000808b],[0x00000000,0x80000001],[0x80000000,0x80008081],[0x80000000,0x00008009],
		[0x00000000,0x0000008a],[0x00000000,0x00000088],[0x00000000,0x80008009],[0x00000000,0x8000000a],
		[0x00000000,0x8000808b],[0x80000000,0x0000008b],[0x80000000,0x00008089],[0x80000000,0x00008003],
		[0x80000000,0x00008002],[0x80000000,0x00000080],[0x00000000,0x0000800a],[0x80000000,0x8000000a],
		[0x80000000,0x80008081],[0x80000000,0x00008080],[0x00000000,0x80000001],[0x80000000,0x80008008]
	];
	const ROTC = [1,3,6,10,15,21,28,36,45,55,2,14,27,41,56,8,25,43,62,18,39,61,20,44];
	const PILN = [10,7,11,17,18,3,5,16,8,21,24,4,15,23,19,13,12,2,20,14,22,9,6,1];

	function rotl(h, l, n) {
		if (n === 0) return [h >>> 0, l >>> 0];
		if (n < 32) return [((h << n) | (l >>> (32 - n))) >>> 0, ((l << n) | (h >>> (32 - n))) >>> 0];
		if (n === 32) return [l >>> 0, h >>> 0];
		n -= 32;
		return [((l << n) | (h >>> (32 - n))) >>> 0, ((h << n) | (l >>> (32 - n))) >>> 0];
	}

	function keccakF(sH, sL) {
		const bcH = new Array(5), bcL = new Array(5);
		for (let round = 0; round < 24; round++) {
			for (let i = 0; i < 5; i++) {
				bcH[i] = (sH[i] ^ sH[i+5] ^ sH[i+10] ^ sH[i+15] ^ sH[i+20]) >>> 0;
				bcL[i] = (sL[i] ^ sL[i+5] ^ sL[i+10] ^ sL[i+15] ^ sL[i+20]) >>> 0;
			}
			for (let i = 0; i < 5; i++) {
				const r = rotl(bcH[(i+1)%5], bcL[(i+1)%5], 1);
				const tH = (bcH[(i+4)%5] ^ r[0]) >>> 0, tL = (bcL[(i+4)%5] ^ r[1]) >>> 0;
				for (let j = 0; j < 25; j += 5) { sH[j+i] = (sH[j+i] ^ tH) >>> 0; sL[j+i] = (sL[j+i] ^ tL) >>> 0; }
			}
			let tH = sH[1], tL = sL[1];
			for (let i = 0; i < 24; i++) {
				const j = PILN[i];
				const cH = sH[j], cL = sL[j];
				const r = rotl(tH, tL, ROTC[i]);
				sH[j] = r[0]; sL[j] = r[1];
				tH = cH; tL = cL;
			}
			for (let j = 0; j < 25; j += 5) {
				for (let i = 0; i < 5; i++) { bcH[i] = sH[j+i]; bcL[i] = sL[j+i]; }
				for (let i = 0; i < 5; i++) {
					sH[j+i] = (sH[j+i] ^ ((~bcH[(i+1)%5]) & bcH[(i+2)%5])) >>> 0;
					sL[j+i] = (sL[j+i] ^ ((~bcL[(i+1)%5]) & bcL[(i+2)%5])) >>> 0;
				}
			}
			sH[0] = (sH[0] ^ RC[round][0]) >>> 0;
			sL[0] = (sL[0] ^ RC[round][1]) >>> 0;
		}
	}

	function keccak256(bytes) {
		const RATE = 136;
		const sH = new Array(25).fill(0), sL = new Array(25).fill(0);
		const padded = new Uint8Array(Math.ceil((bytes.length + 1) / RATE) * RATE);
		padded.set(bytes);
		padded[bytes.length] = 0x01;
		padded[padded.length - 1] |= 0x80;
		for (let off = 0; off < padded.length; off += RATE) {
			for (let i = 0; i < RATE / 8; i++) {
				const b = off + i * 8;
				sL[i] = (sL[i] ^ (padded[b] | (padded[b+1]<<8) | (padded[b+2]<<16) | (padded[b+3]<<24))) >>> 0;
				sH[i] = (sH[i] ^ (padded[b+4] | (padded[b+5]<<8) | (padded[b+6]<<16) | (padded[b+7]<<24))) >>> 0;
			}
			keccakF(sH, sL);
		}
		const out = new Uint8Array(32);
		for (let i = 0; i < 4; i++) {
			const lo = sL[i] >>> 0, hi = sH[i] >>> 0;
			out[i*8+0]=lo&0xff; out[i*8+1]=(lo>>>8)&0xff; out[i*8+2]=(lo>>>16)&0xff; out[i*8+3]=(lo>>>24)&0xff;
			out[i*8+4]=hi&0xff; out[i*8+5]=(hi>>>8)&0xff; out[i*8+6]=(hi>>>16)&0xff; out[i*8+7]=(hi>>>24)&0xff;
		}
		return out;
	}

	function toHex(bytes) {
		return Array.from(bytes).map(b => b.toString(16).padStart(2, "0")).join("");
	}

	function selfTest() {
		const enc = new TextEncoder();
		const cases = [
			["", "c5d2460186f7233c927e7db2dcc703c0e500b653ca82273b7bfad8045d85a470"],
			["abc", "4e03657aea45a94fc7d47ba826c8d667c0d1e6e33a64a036ec44f58fa12d6c45"],
			["The quick brown fox jumps over the lazy dog", "4d741b6f1eb29cb2a9b9911c82f56fa8d73b04959d3d9d222895df6c0b28aa15"]
		];
		for (const c of cases) {
			const got = toHex(keccak256(enc.encode(c[0])));
			if (got !== c[1]) throw new Error("Keccak-256 self-test FAILED for input '" + c[0] + "': got " + got);
		}
		return true;
	}

	return { keccak256, toHex, selfTest };
})();

/* ---------------------------------------------------------
   Merkle tree. TWO possible Candy Guard-compatible schemes exist in
   the wild and this codebase could not definitively confirm which
   one from documentation alone — both are now selectable (Step 3's
   new "Merkle hash scheme" dropdown) instead of guessing again:

     "prefixed"   — Solana's own spec (solana-foundation/specs,
                    core/merkle-tree.md): leaf pre-image = 0x00 + data,
                    internal node pre-image = 0x01 + two 32-byte hashes.
     "unprefixed" — the OpenZeppelin MerkleProof.sol scheme (Metaplex's
                    own gumdrop program is a direct port of this):
                    leaf = caller-provided hash as-is, internal node =
                    keccak256(sorted_pair) with NO prefix byte at all.

   getMerkleRoot/getMerkleProof/hashPair/hashLeaf all take an explicit
   `scheme` argument (default "prefixed") so Steps 3 and 4 always agree
   on which one they're using — see allowListEntries()'s companion
   scheme selector.
   --------------------------------------------------------- */
const RelaxMerkle = (function () {
	const { keccak256 } = RelaxKeccak;

	function compare(a, b) {
		for (let i = 0; i < a.length && i < b.length; i++) {
			if (a[i] !== b[i]) return a[i] < b[i] ? -1 : 1;
		}
		return a.length - b.length;
	}
	function hashPair(a, b, scheme) {
		const [left, right] = compare(a, b) <= 0 ? [a, b] : [b, a];
		if (scheme === "unprefixed") {
			const merged = new Uint8Array(left.length + right.length);
			merged.set(left, 0);
			merged.set(right, left.length);
			return keccak256(merged);
		}
		const merged = new Uint8Array(1 + left.length + right.length);
		merged[0] = 0x01;
		merged.set(left, 1);
		merged.set(right, 1 + left.length);
		return keccak256(merged);
	}
	function toLeafBytes(item) {
		return typeof item === "string" ? new TextEncoder().encode(item) : item;
	}
	function hashLeaf(bytes, scheme) {
		if (scheme === "unprefixed") return keccak256(bytes);
		const prefixed = new Uint8Array(1 + bytes.length);
		prefixed[0] = 0x00;
		prefixed.set(bytes, 1);
		return keccak256(prefixed);
	}
	/** Full tree, level 0 = root, last level = leaves. */
	function getMerkleTree(items, scheme = "unprefixed") {
		let level = items.map(i => hashLeaf(toLeafBytes(i), scheme));
		const levels = [level];
		while (level.length > 1) {
			const next = [];
			for (let i = 0; i < level.length; i += 2) {
				next.push(i + 1 < level.length ? hashPair(level[i], level[i + 1], scheme) : level[i]);
			}
			levels.unshift(next);
			level = next;
		}
		return levels;
	}
	function getMerkleRoot(items, scheme = "unprefixed") {
		return getMerkleTree(items, scheme)[0][0];
	}
	/** Sibling hashes from leaf up to (not including) the root. */
	function getMerkleProof(items, target, scheme = "unprefixed") {
		const levels = getMerkleTree(items, scheme);
		const targetLeaf = hashLeaf(toLeafBytes(target), scheme);
		let index = levels[levels.length - 1].findIndex(l => compare(l, targetLeaf) === 0);
		if (index < 0) throw new Error("Target is not in the allow list.");
		const proof = [];
		for (let d = levels.length - 1; d > 0; d--) {
			const level = levels[d];
			const siblingIndex = index % 2 === 0 ? index + 1 : index - 1;
			if (siblingIndex < level.length) proof.push(level[siblingIndex]);
			index = Math.floor(index / 2);
		}
		return proof;
	}
	return { getMerkleTree, getMerkleRoot, getMerkleProof, hashPair, hashLeaf };
})();

RelaxKeccak.selfTest();
const RelaxBorsh = (function () {
	function createWriter() {
		const chunks = [];
		return {
			pushBytes(bytes) { chunks.push(bytes); },
			toBytes() {
				let total = 0;
				for (const c of chunks) total += c.length;
				const out = new Uint8Array(total);
				let offset = 0;
				for (const c of chunks) { out.set(c, offset); offset += c.length; }
				return out;
			}
		};
	}
	function u8(n) {
		if (n < 0 || n > 255) throw new Error("u8 out of range: " + n);
		return Uint8Array.of(n);
	}
	function u16(n) {
		const buf = new ArrayBuffer(2);
		new DataView(buf).setUint16(0, n, true);
		return new Uint8Array(buf);
	}
	function u32(n) {
		const buf = new ArrayBuffer(4);
		new DataView(buf).setUint32(0, n, true);
		return new Uint8Array(buf);
	}
	function u64(n) {
		const big = typeof n === "bigint" ? n : BigInt(n);
		if (big < 0n || big > 0xFFFFFFFFFFFFFFFFn) throw new Error("u64 out of range: " + n);
		const buf = new ArrayBuffer(8);
		new DataView(buf).setBigUint64(0, big, true);
		return new Uint8Array(buf);
	}
	function bool(b) { return Uint8Array.of(b ? 1 : 0); }
	function str(s) {
		const bytes = new TextEncoder().encode(s);
		const w = createWriter();
		w.pushBytes(u32(bytes.length));
		w.pushBytes(bytes);
		return w.toBytes();
	}
	function pubkey(input) {
		const bytes = (input && typeof input.toBytes === "function")
			? input.toBytes()
			: new solanaWeb3.PublicKey(input).toBytes();
		if (bytes.length !== 32) throw new Error("pubkey must be 32 bytes, got " + bytes.length);
		return bytes;
	}
	function option(value, encodeFn) {
		if (value === null || value === undefined) return Uint8Array.of(0);
		const w = createWriter();
		w.pushBytes(Uint8Array.of(1));
		w.pushBytes(encodeFn(value));
		return w.toBytes();
	}
	function vec(items, encodeFn) {
		const w = createWriter();
		w.pushBytes(u32(items.length));
		for (const item of items) w.pushBytes(encodeFn(item));
		return w.toBytes();
	}
	function concatAll(arraysOfBytes) {
		const w = createWriter();
		for (const b of arraysOfBytes) w.pushBytes(b);
		return w.toBytes();
	}
	return { u8, u16, u32, u64, bool, str, pubkey, option, vec, concatAll };
})();

/* =========================================================
   INLINED — the two Token Metadata PDAs this harness needs
   (same derivations as instruction-builder.js)
   ========================================================= */
const RelaxPdas = (function () {
	const TOKEN_METADATA_PROGRAM_ID = "metaqbxxUerdq28cj1RbAWkYQm3ybzjb6a8bt518x1s";
	function pk(x) { return x instanceof solanaWeb3.PublicKey ? x : new solanaWeb3.PublicKey(x); }

	async function findMetadataPda(mint) {
		const [pda] = await solanaWeb3.PublicKey.findProgramAddress(
			[new TextEncoder().encode("metadata"), pk(TOKEN_METADATA_PROGRAM_ID).toBytes(), pk(mint).toBytes()],
			pk(TOKEN_METADATA_PROGRAM_ID)
		);
		return pda;
	}
	async function findMasterEditionPda(mint) {
		const [pda] = await solanaWeb3.PublicKey.findProgramAddress(
			[
				new TextEncoder().encode("metadata"),
				pk(TOKEN_METADATA_PROGRAM_ID).toBytes(),
				pk(mint).toBytes(),
				new TextEncoder().encode("edition")
			],
			pk(TOKEN_METADATA_PROGRAM_ID)
		);
		return pda;
	}
	return { TOKEN_METADATA_PROGRAM_ID, findMetadataPda, findMasterEditionPda };
})();

/* =========================================================
   INLINED — RELAX Candy Machine V3 instruction builder
   =========================================================
   REVISION 3 (23 Jul 2026). Change log, so the reasoning survives:

   R2 fixed ConstraintRaw (0x7d3) on account `candy_machine`:
     getSpaceForCandy() was sizing the header DYNAMICALLY. The program
     reserves it at MAXIMUM sizes and treats the hidden section as
     starting at a FIXED offset of 850 (Metaplex's own account table).
     Also: the byte mask is (items/8)+1 with integer division, not
     ceil(items/8); and mint indices are allocated unconditionally,
     not only when isSequential is false.

   R2 also replaced the collectionDelegateRecord PLACEHOLDER with the
   real Token Metadata MetadataDelegateRecord PDA, and corrected the
   note claiming a prior delegate-approval step was required — it
   isn't; InitializeV2 creates that record itself via CPI, which is
   exactly why collection_update_authority has to sign.

   R3 fixes ConstraintMut (0x7d0) on account `collection_metadata`:
     it was passed read-only, because Metaplex's own initialize_v2
     account table leaves the Writable column blank for that row. The
     table is wrong there — the program has #[account(mut)] on it. The
     same README marks collection_metadata as writable in the `mint`
     and `set_collection_v2` tables, so the inconsistency is in the
     docs, not the program.

   Rule going forward: when an on-chain error names both an account
   and a constraint, believe the program over the documentation.
   ========================================================= */
const RelaxCandyMachine = (function () {
	const { u8, u16, u32, u64, bool, str, pubkey, option, vec, concatAll } = RelaxBorsh;

	// NOT the newer, incompatible "Core Candy Machine"
	// (CMACYFENjoBMHzapRXyo1JZkVS6EtaDDzkjMrmQLvr4J) — that one mints
	// Metaplex Core assets, already ruled out for RELAX (22 Jul 2026).
	const CANDY_MACHINE_CORE_PROGRAM_ID = "CndyV3LdqHUfDLmE5naZjVN8rBZz4tqhdefbAnjHG3JR";
	const TOKEN_METADATA_PROGRAM_ID = RelaxPdas.TOKEN_METADATA_PROGRAM_ID;
	const SYSTEM_PROGRAM_ID = "11111111111111111111111111111111";
	const SYSVAR_INSTRUCTIONS_ID = "Sysvar1nstructions1111111111111111111111111";

	/**
	 * Fixed byte offset where the CandyMachine account's hidden section
	 * (config lines + byte mask + mint indices) begins. The struct
	 * header above it is reserved at maximum sizes regardless of what
	 * is actually used: always 5 creator slots, a 10-byte symbol, a
	 * 32-byte name prefix + 200-byte uri prefix, and a full
	 * HiddenSettings block.
	 *   8 discriminator + 1 account_version + 1 token_standard
	 *   + 6 features + 32 authority + 32 mint_authority
	 *   + 32 collection_mint + 8 items_redeemed + 8 items_available
	 *   + 14 symbol + 2 seller_fee + 8 max_supply + 1 is_mutable
	 *   + 174 creators (4 + 5*34)
	 *   + 250 config_line_settings (1 + 36 + 4 + 204 + 4 + 1)
	 *   + 273 hidden_settings (1 + 36 + 204 + 32)
	 *   = 850
	 */
	const HIDDEN_SECTION = 850;

	/**
	 * Trailing rule-set flag (1) + rule-set pubkey (32). Only meaningful
	 * for pNFTs, reserved anyway: the on-chain check is
	 * data_len() >= get_space_for_candy(), a GREATER-THAN-OR-EQUAL, so
	 * over-allocating is always accepted and costs ~0.00023 SOL.
	 * Under-allocating is what caused 0x7d3. The trade is not close.
	 */
	const RULE_SET_RESERVE = 33;

	// sha256("global:<name>").slice(0,8) — Anchor's own convention.
	// Confirmed live: devnet logged "Instruction: InitializeV2", which
	// only happens after these 8 bytes match.
	const DISCRIMINATOR = {
		initializeV2:    Uint8Array.of(67, 153, 175, 39, 218, 16, 38, 32),
		addConfigLines:  Uint8Array.of(223, 50, 224, 227, 151, 8, 115, 106),
		setCollectionV2: Uint8Array.of(229, 35, 61, 91, 15, 14, 99, 160),
		withdraw:        Uint8Array.of(183, 18, 70, 156, 148, 109, 161, 34)
	};

	function pk(x) { return x instanceof solanaWeb3.PublicKey ? x : new solanaWeb3.PublicKey(x); }

	/** Seeds: ["candy_machine", candy_machine_pubkey] */
	async function findCandyMachineAuthorityPda(candyMachinePubkey) {
		const [pda] = await solanaWeb3.PublicKey.findProgramAddress(
			[new TextEncoder().encode("candy_machine"), pk(candyMachinePubkey).toBytes()],
			pk(CANDY_MACHINE_CORE_PROGRAM_ID)
		);
		return pda;
	}

	/**
	 * Token Metadata MetadataDelegateRecord PDA, Collection role.
	 * Seeds: ["metadata", tm_program_id, mint, "collection_delegate",
	 *         update_authority, delegate]
	 * The delegate here is the Candy Machine's own authority PDA.
	 * InitializeV2 CREATES this record itself via CPI — no separate
	 * approval step is needed beforehand.
	 */
	async function findCollectionDelegateRecordPda({ collectionMint, collectionUpdateAuthority, delegate }) {
		const enc = new TextEncoder();
		const tm = pk(TOKEN_METADATA_PROGRAM_ID);
		const [pda] = await solanaWeb3.PublicKey.findProgramAddress(
			[
				enc.encode("metadata"),
				tm.toBytes(),
				pk(collectionMint).toBytes(),
				enc.encode("collection_delegate"),
				pk(collectionUpdateAuthority).toBytes(),
				pk(delegate).toBytes()
			],
			tm
		);
		return pda;
	}

	/* ---- struct encoders ---- */

	function encodeCreator(creator) {
		return concatAll([pubkey(creator.address), bool(!!creator.verified), u8(creator.percentageShare)]);
	}
	function encodeConfigLineSettings(s) {
		return concatAll([
			str(s.prefixName || ""), u32(s.nameLength),
			str(s.prefixUri || ""), u32(s.uriLength),
			bool(!!s.isSequential)
		]);
	}
	function encodeHiddenSettings(s) {
		if (s.hash.length !== 32) throw new Error("HiddenSettings.hash must be exactly 32 bytes");
		return concatAll([str(s.name), str(s.uri), s.hash]);
	}
	function encodeCandyMachineData(data) {
		return concatAll([
			u64(data.itemsAvailable),
			str(data.symbol || ""),
			u16(data.sellerFeeBasisPoints || 0),
			u64(data.maxSupply || 0),
			bool(data.isMutable !== false),
			vec(data.creators || [], encodeCreator),
			option(data.configLineSettings || null, encodeConfigLineSettings),
			option(data.hiddenSettings || null, encodeHiddenSettings)
		]);
	}
	function encodeConfigLine(line) {
		return concatAll([str(line.name), str(line.uri)]);
	}

	/**
	 * Client-side validation before a wallet popup, using the program's
	 * own limits: symbol <= 10 bytes, <= 4 creators (the candy machine
	 * itself occupies the 5th slot), shares total 100, prefix+length
	 * within the on-chain name (32) / uri (200) fields, exactly one of
	 * configLineSettings / hiddenSettings.
	 */
	function validateCandyMachineData(data) {
		const errors = [];
		const enc = new TextEncoder();
		const symbolBytes = enc.encode(data.symbol || "").length;
		if (symbolBytes > 10) errors.push("symbol is " + symbolBytes + " bytes, max is 10");

		const creators = data.creators || [];
		if (creators.length > 4) errors.push("too many creators (" + creators.length + "), max is 4");
		if (creators.length > 0) {
			const totalShare = creators.reduce((s, c) => s + Number(c.percentageShare || 0), 0);
			if (totalShare !== 100) errors.push("creator shares total " + totalShare + ", must be exactly 100");
		}

		const hasLines = !!data.configLineSettings;
		const hasHidden = !!data.hiddenSettings;
		if (hasLines === hasHidden) errors.push("provide exactly one of configLineSettings / hiddenSettings");

		if (hasLines) {
			const s = data.configLineSettings;
			const pn = enc.encode(s.prefixName || "").length;
			const pu = enc.encode(s.prefixUri || "").length;
			if (pn + Number(s.nameLength) > 32) errors.push("prefixName (" + pn + ") + nameLength (" + s.nameLength + ") exceeds 32");
			if (pu + Number(s.uriLength) > 200) errors.push("prefixUri (" + pu + ") + uriLength (" + s.uriLength + ") exceeds 200");
		}

		if (!(Number(data.itemsAvailable) > 0)) errors.push("itemsAvailable must be greater than 0");

		if (errors.length) throw new Error("Invalid CandyMachineData:\n  - " + errors.join("\n  - "));
		return true;
	}

	/* ---- account sizing ---- */

	function describeSpaceForCandy(candyMachineData) {
		if (candyMachineData.hiddenSettings) {
			return {
				total: HIDDEN_SECTION,
				breakdown: [{ label: "fixed header (hidden settings mode, no config lines)", bytes: HIDDEN_SECTION }]
			};
		}
		const settings = candyMachineData.configLineSettings;
		if (!settings) throw new Error("getSpaceForCandy: must provide either configLineSettings or hiddenSettings");

		const items = Number(candyMachineData.itemsAvailable);
		if (!Number.isFinite(items) || items <= 0) {
			throw new Error("getSpaceForCandy: itemsAvailable must be a positive number, got " + candyMachineData.itemsAvailable);
		}
		const configLineSize = Number(settings.nameLength) + Number(settings.uriLength);

		const breakdown = [
			{ label: "fixed header (HIDDEN_SECTION, offset of hidden data)", bytes: HIDDEN_SECTION },
			{ label: "items-loaded counter (u32)", bytes: 4 },
			{ label: "config lines (" + items + " x " + configLineSize + ")", bytes: items * configLineSize },
			{ label: "byte mask ((items / 8) + 1)", bytes: Math.floor(items / 8) + 1 },
			{ label: "mint indices (" + items + " x u32)", bytes: items * 4 },
			{ label: "rule set flag + pubkey (reserved)", bytes: RULE_SET_RESERVE }
		];
		return { total: breakdown.reduce((s, b) => s + b.bytes, 0), breakdown };
	}

	function getSpaceForCandy(candyMachineData) {
		return describeSpaceForCandy(candyMachineData).total;
	}

	/**
	 * Conservative estimate of ConfigLines per AddConfigLines tx.
	 * ~1232-byte packet limit, minus ~350 bytes of signature/header/
	 * account-keys/blockhash overhead, minus 16 bytes of instruction
	 * data before the vec; each line costs name+uri plus 8 bytes of
	 * Borsh length prefixes. Step 2 measures the real size — trust
	 * that, not this.
	 */
	function estimateLinesPerTransaction(nameLength, uriLength) {
		const perLine = Number(nameLength) + Number(uriLength) + 8;
		return Math.max(1, Math.floor((1232 - 350 - 16) / perLine));
	}

	/* ---- instruction builders ---- */

	/**
	 * InitializeV2 — the CandyMachine account must ALREADY exist,
	 * pre-sized via SystemProgram.createAccount and assigned to
	 * CANDY_MACHINE_CORE_PROGRAM_ID.
	 *
	 * 15 accounts, in this exact order. Writable/signer flags reflect
	 * the PROGRAM, which differs from the README on collection_metadata
	 * — see the R3 note in this section's header:
	 *
	 *   0  candy_machine                writable
	 *   1  authority_pda                writable
	 *   2  authority
	 *   3  payer                        writable, signer
	 *   4  rule_set                     (optional -> program ID)
	 *   5  collection_metadata          writable   <-- R3 fix
	 *   6  collection_mint
	 *   7  collection_master_edition
	 *   8  collection_update_authority  writable, signer
	 *   9  collection_delegate_record   writable
	 *   10 token_metadata_program
	 *   11 system_program
	 *   12 sysvar_instructions
	 *   13 authorization_rules_program  (optional -> program ID)
	 *   14 authorization_rules          (optional -> program ID)
	 *
	 * The optional slots use Anchor v0.26's positional-optional
	 * convention: "None" means passing the executing program's own ID,
	 * NOT omitting the slot. Omitting them produced AccountNotEnoughKeys.
	 */
	async function buildInitializeV2Instruction(params) {
		validateCandyMachineData(params.candyMachineData);

		const authorityPda = await findCandyMachineAuthorityPda(params.candyMachine);

		// Derived, never taken as a caller-supplied placeholder — each of
		// these is a pure function of collectionMint (+ update authority).
		const collectionMetadata = params.collectionMetadata
			|| await RelaxPdas.findMetadataPda(params.collectionMint);
		const collectionMasterEdition = params.collectionMasterEdition
			|| await RelaxPdas.findMasterEditionPda(params.collectionMint);
		const collectionDelegateRecord = params.collectionDelegateRecord
			|| await findCollectionDelegateRecordPda({
				collectionMint: params.collectionMint,
				collectionUpdateAuthority: params.collectionUpdateAuthority,
				delegate: authorityPda
			});

		const none = pk(CANDY_MACHINE_CORE_PROGRAM_ID);

		const keys = [
			{ pubkey: pk(params.candyMachine),              isSigner: false, isWritable: true  },
			{ pubkey: authorityPda,                         isSigner: false, isWritable: true  },
			{ pubkey: pk(params.authority),                 isSigner: false, isWritable: false },
			{ pubkey: pk(params.payer),                     isSigner: true,  isWritable: true  },
			{ pubkey: none,                                 isSigner: false, isWritable: false },
			{ pubkey: pk(collectionMetadata),               isSigner: false, isWritable: true  },
			{ pubkey: pk(params.collectionMint),            isSigner: false, isWritable: false },
			{ pubkey: pk(collectionMasterEdition),          isSigner: false, isWritable: false },
			{ pubkey: pk(params.collectionUpdateAuthority), isSigner: true,  isWritable: true  },
			{ pubkey: pk(collectionDelegateRecord),         isSigner: false, isWritable: true  },
			{ pubkey: pk(TOKEN_METADATA_PROGRAM_ID),        isSigner: false, isWritable: false },
			{ pubkey: pk(SYSTEM_PROGRAM_ID),                isSigner: false, isWritable: false },
			{ pubkey: pk(SYSVAR_INSTRUCTIONS_ID),           isSigner: false, isWritable: false },
			{ pubkey: none,                                 isSigner: false, isWritable: false },
			{ pubkey: none,                                 isSigner: false, isWritable: false }
		];

		const data = concatAll([
			DISCRIMINATOR.initializeV2,
			encodeCandyMachineData(params.candyMachineData),
			u8(params.tokenStandard !== undefined ? params.tokenStandard : 0)
		]);

		return new solanaWeb3.TransactionInstruction({
			programId: pk(CANDY_MACHINE_CORE_PROGRAM_ID), keys, data
		});
	}

	function buildAddConfigLinesInstruction(params) {
		if (!Array.isArray(params.lines) || params.lines.length === 0) {
			throw new Error("buildAddConfigLinesInstruction: lines must be a non-empty array");
		}
		const keys = [
			{ pubkey: pk(params.candyMachine), isSigner: false, isWritable: true  },
			{ pubkey: pk(params.authority),    isSigner: true,  isWritable: false }
		];
		const data = concatAll([
			DISCRIMINATOR.addConfigLines,
			u32(params.startIndex),
			vec(params.lines, encodeConfigLine)
		]);
		return new solanaWeb3.TransactionInstruction({
			programId: pk(CANDY_MACHINE_CORE_PROGRAM_ID), keys, data
		});
	}

	/**
	 * Anchor ranges: 2000-2999 constraint violations, 3000-3999 account
	 * errors, 6000+ the program's own CandyError variants. The account
	 * name in the log matters as much as the code — read both.
	 */
	function explainErrorCode(code) {
		const n = typeof code === "string" && code.startsWith("0x") ? parseInt(code, 16) : Number(code);
		const known = {
			2000: "ConstraintMut — an account was passed read-only that the program declares as #[account(mut)]. The log names which one; flip that account's isWritable to true.",
			2001: "ConstraintHasOne — a has_one relationship failed; an account doesn't belong to the one that claims it.",
			2002: "ConstraintSigner — an account the program requires as a signer was passed without isSigner.",
			2003: "ConstraintRaw — the candy_machine account failed the raw constraint: either it isn't owned by the Candy Machine program, or its allocated data_len is SMALLER than get_space_for_candy().",
			2006: "ConstraintSeeds — a PDA was derived with the wrong seeds or the wrong program id.",
			3003: "AccountDiscriminatorNotZero — the candy_machine account isn't blank; it's already initialized. Generate a fresh keypair.",
			3005: "AccountNotEnoughKeys — fewer accounts passed than expected. InitializeV2 needs all 15 slots, optionals filled with the program's own ID.",
			3012: "AccountNotInitialized — an account that must already exist on chain doesn't.",
			6005: "TooManyCreators — max 4 creators (the candy machine itself takes the 5th slot).",
			6006: "MissingRemainingAccount (Candy Guard) — a guard needed an account in the instruction's REMAINING accounts and it wasn't there. Which guard depends on the log line: AllowList's route needs [proof_pda (writable), system_program]; mint_v2 needs one entry per account-requiring guard, in guard-definition order.",
			6008: "AddressNotFoundInAllowedList — the Merkle proof did not verify against the guard's root. Usually the leaf encoding: the tree must hash exactly what the on-chain guard hashes (base58 string vs raw pubkey bytes). Switch the leaf-encoding selector in Step 3, rebuild the guard, retry.",
			6013: "CollectionKeyMismatch — the collection_mint account passed to mint_v2 is not the one stored inside the Candy Machine. Use \"Read Candy Machine state\" to see what the machine actually holds.",
			6020: "NotFullyLoaded — the Candy Machine still has fewer config lines loaded than items_available. mint_v2 refuses to mint until the machine is completely full; run Step 2 to load every item.",
			6012: "IncorrectCollectionAuthority — the signer isn't the collection's update authority."
		};
		return known[n] || ("Unmapped error code " + n + " (0x" + n.toString(16) + ").");
	}

	return {
		CANDY_MACHINE_CORE_PROGRAM_ID, TOKEN_METADATA_PROGRAM_ID, HIDDEN_SECTION,
		findCandyMachineAuthorityPda, findCollectionDelegateRecordPda,
		encodeCandyMachineData, encodeConfigLine,
		validateCandyMachineData, getSpaceForCandy, describeSpaceForCandy,
		estimateLinesPerTransaction,
		buildInitializeV2Instruction, buildAddConfigLinesInstruction,
		explainErrorCode
	};
})();

/* =========================================================
   INLINED — RELAX Candy Guard instruction builder
   =========================================================
   Byte layouts transcribed directly from the real, installed, working
   @metaplex-foundation/mpl-candy-guard npm package source
   (dist/src/parser.js + dist/src/generated/*), read directly — not
   guessed from README prose, which turned out to have a real error
   (Allocation's field is `limit: u32`, 5 bytes total — NOT
   `size: u16`/3 bytes as the README describes). See
   SWAP_V2_MIGRATION_PLAN.md's "Candy Guard byte format solved" section
   for the full research trail.
   ========================================================= */
const RelaxCandyGuard = (function () {
	const { u8, u16, u32, u64, bool, concatAll } = RelaxBorsh;

	const CANDY_GUARD_PROGRAM_ID = "Guard1JwRhJkVH6XZhzoYxeBVQe872VH6QggF4BWmS9g";
	const SYSTEM_PROGRAM_ID = "11111111111111111111111111111111";

	const DISCRIMINATOR = {
		initialize: Uint8Array.of(175, 175, 109, 31, 13, 152, 155, 237),
		mintV2: Uint8Array.of(120, 121, 23, 146, 173, 110, 199, 205),
		route: Uint8Array.of(229, 23, 203, 151, 122, 227, 173, 42),
		wrap: Uint8Array.of(178, 40, 10, 189, 228, 129, 186, 140)
	};

	function pk(x) { return x instanceof solanaWeb3.PublicKey ? x : new solanaWeb3.PublicKey(x); }

	const GUARDS_NAME = [
		"botTax", "solPayment", "tokenPayment", "startDate", "thirdPartySigner",
		"tokenGate", "gatekeeper", "endDate", "allowList", "mintLimit",
		"nftPayment", "redeemedAmount", "addressGate", "nftGate", "nftBurn",
		"tokenBurn", "freezeSolPayment", "freezeTokenPayment", "programGate",
		"allocation", "token2022Payment"
	];
	const GUARDS_SIZE = {
		botTax: 9, solPayment: 40, tokenPayment: 72, startDate: 8,
		thirdPartySigner: 32, tokenGate: 40, gatekeeper: 33, endDate: 8,
		allowList: 32, mintLimit: 3, nftPayment: 64, redeemedAmount: 8,
		addressGate: 32, nftGate: 32, nftBurn: 32, tokenBurn: 40,
		freezeSolPayment: 40, freezeTokenPayment: 72, programGate: 164,
		allocation: 5, token2022Payment: 72
	};
	const GUARD_TYPE = {
		botTax: 0, solPayment: 1, tokenPayment: 2, startDate: 3,
		thirdPartySigner: 4, tokenGate: 5, gatekeeper: 6, endDate: 7,
		allowList: 8, mintLimit: 9, nftPayment: 10, redeemedAmount: 11,
		addressGate: 12, nftGate: 13, nftBurn: 14, tokenBurn: 15,
		freezeSolPayment: 16, freezeTokenPayment: 17, programGate: 18,
		allocation: 19, token2022Payment: 20
	};
	const MAX_LABEL_LENGTH = 6;

	function encodeAllowList(g) {
		if (g.merkleRoot.length !== 32) throw new Error("AllowList.merkleRoot must be 32 bytes");
		return g.merkleRoot;
	}
	function encodeMintLimit(g) { return concatAll([u8(g.id), u16(g.limit)]); }
	function encodeStartDate(g) { return u64(BigInt(g.date)); }
	function encodeEndDate(g) { return u64(BigInt(g.date)); }
	function encodeBotTax(g) { return concatAll([u64(g.lamports), bool(!!g.lastInstruction)]); }
	function encodeAllocation(g) { return concatAll([u8(g.id), u32(g.limit)]); } // CORRECTED: limit:u32, not size:u16

	const GUARD_ENCODERS = {
		allowList: encodeAllowList, mintLimit: encodeMintLimit,
		startDate: encodeStartDate, endDate: encodeEndDate,
		botTax: encodeBotTax, allocation: encodeAllocation
	};

	function encodeGuardSet(guardSet) {
		guardSet = guardSet || {};
		let features = 0n;
		const dataChunks = [];
		GUARDS_NAME.forEach((name, index) => {
			const value = guardSet[name];
			if (value) {
				const encoder = GUARD_ENCODERS[name];
				if (!encoder) throw new Error("No encoder for guard '" + name + "'");
				const encoded = encoder(value);
				if (encoded.length !== GUARDS_SIZE[name]) {
					throw new Error("Size mismatch for '" + name + "': expected " + GUARDS_SIZE[name] + ", got " + encoded.length);
				}
				dataChunks.push(encoded);
				features |= (1n << BigInt(index));
			}
		});
		return concatAll([u64(features), concatAll(dataChunks)]);
	}

	function encodeCandyGuardData(data) {
		const chunks = [encodeGuardSet(data.default)];
		const groups = data.groups || [];
		chunks.push(u32(groups.length));
		for (const group of groups) {
			if (group.label.length > MAX_LABEL_LENGTH) throw new Error("Label too long: " + group.label);
			const labelBytes = new Uint8Array(MAX_LABEL_LENGTH);
			labelBytes.set(new TextEncoder().encode(group.label));
			chunks.push(labelBytes);
			chunks.push(encodeGuardSet(group.guards));

		return concatAll(chunks);

	async function findCandyGuardPda(basePubkey) {
		const [pda] = await solanaWeb3.PublicKey.findProgramAddress(
			[new TextEncoder().encode("candy_guard"), pk(basePubkey).toBytes()],
			pk(CANDY_GUARD_PROGRAM_ID)
		);
		return pda;
	}

	/**
	 * AllowList proof PDA — seeds ["allow_list", merkle_root,
	 * minter/payer key, candy_guard, candy_machine]. Created by the
	 * `route` instruction, then READ by mint_v2 as proof the wallet
	 * already validated. Source: candy-guard README, AllowList section.
	 */
	async function findAllowListProofPda({ merkleRoot, minter, candyGuard, candyMachine }) {
		if (merkleRoot.length !== 32) throw new Error("merkleRoot must be 32 bytes");
		const [pda] = await solanaWeb3.PublicKey.findProgramAddress(
			[
				new TextEncoder().encode("allow_list"),
				merkleRoot,
				pk(minter).toBytes(),
				pk(candyGuard).toBytes(),
				pk(candyMachine).toBytes()
			],
			pk(CANDY_GUARD_PROGRAM_ID)
		);
		return pda;
	}

	/**
	 * MintLimit counter PDA — seeds ["mint_limit", guard id (u8),
	 * payer/minter key, candy_guard, candy_machine]. Must be passed
	 * WRITABLE in mint_v2's remaining accounts; the guard creates and
	 * increments it.
	 */
	async function findMintLimitCounterPda({ id, minter, candyGuard, candyMachine }) {
		const [pda] = await solanaWeb3.PublicKey.findProgramAddress(
			[
				new TextEncoder().encode("mint_limit"),
				Uint8Array.of(id),
				pk(minter).toBytes(),
				pk(candyGuard).toBytes(),
				pk(candyMachine).toBytes()
			],
			pk(CANDY_GUARD_PROGRAM_ID)
		);
		return pda;
	}

	/**
	 * Borsh-encodes a Merkle proof as Vec<[u8; 32]> for the AllowList
	 * route payload. NOTE the empty case: an empty Vec is still FOUR
	 * bytes (a u32 length of 0), not zero bytes. Passing a genuinely
	 * empty buffer makes the guard's Vec::try_from_slice fail rather
	 * than deserialize to an empty proof — which is exactly the bug
	 * this replaces, and it matters here because the single-leaf test
	 * tree's proof IS empty.
	 */
	function encodeMerkleProof(proof) {
		const chunks = [u32(proof.length)];
		for (const node of proof) {
			if (node.length !== 32) throw new Error("Each proof node must be 32 bytes");
			chunks.push(node);
		}
		return concatAll(chunks);
	}

	function buildInitializeInstruction(params) {
		const keys = [
			{ pubkey: pk(params.candyGuard), isSigner: false, isWritable: true },
			{ pubkey: pk(params.base), isSigner: true, isWritable: false },
			{ pubkey: pk(params.authority), isSigner: false, isWritable: false },
			{ pubkey: pk(params.payer), isSigner: true, isWritable: true },
			{ pubkey: pk(SYSTEM_PROGRAM_ID), isSigner: false, isWritable: false }
		];
		const encoded = encodeCandyGuardData(params.candyGuardData);
		const data = concatAll([DISCRIMINATOR.initialize, u32(encoded.length), encoded]);
		return new solanaWeb3.TransactionInstruction({ programId: pk(CANDY_GUARD_PROGRAM_ID), keys, data });
	}

	function buildWrapInstruction(params) {
		const keys = [
			{ pubkey: pk(params.candyGuard), isSigner: false, isWritable: false },
			{ pubkey: pk(params.authority), isSigner: true, isWritable: false },
			{ pubkey: pk(params.candyMachine), isSigner: false, isWritable: true },
			{ pubkey: pk(RelaxCandyMachine.CANDY_MACHINE_CORE_PROGRAM_ID), isSigner: false, isWritable: false },
			{ pubkey: pk(params.candyMachineAuthority), isSigner: true, isWritable: false }
		];
		return new solanaWeb3.TransactionInstruction({
			programId: pk(CANDY_GUARD_PROGRAM_ID), keys, data: concatAll([DISCRIMINATOR.wrap])
		});
	}

	function buildRouteInstruction(params) {
		if (!(params.guardName in GUARD_TYPE)) throw new Error("Unknown guard '" + params.guardName + "'");
		const keys = [
			{ pubkey: pk(params.candyGuard), isSigner: false, isWritable: false },
			{ pubkey: pk(params.candyMachine), isSigner: false, isWritable: true },
			{ pubkey: pk(params.payer), isSigner: true, isWritable: true },

		const enc = new TextEncoder();

		return new solanaWeb3.TransactionInstruction({ programId: pk(CANDY_GUARD_PROGRAM_ID), keys, data });
	}

	function buildMintV2Instruction(params) {
		const none = pk(CANDY_GUARD_PROGRAM_ID);
		const keys = [
			{ pubkey: pk(params.candyGuard), isSigner: false, isWritable: false },
			{ pubkey: pk(RelaxCandyMachine.CANDY_MACHINE_CORE_PROGRAM_ID), isSigner: false, isWritable: false },
			{ pubkey: pk(params.candyMachine), isSigner: false, isWritable: true },
			{ pubkey: pk(params.candyMachineAuthorityPda), isSigner: false, isWritable: true },
			{ pubkey: pk(params.payer), isSigner: true, isWritable: true },
			{ pubkey: pk(params.minter), isSigner: true, isWritable: true },
			{ pubkey: pk(params.nftMint), isSigner: false, isWritable: true },
			{ pubkey: pk(params.nftMintAuthority), isSigner: true, isWritable: false },
			{ pubkey: pk(params.nftMetadata), isSigner: false, isWritable: true },
			{ pubkey: pk(params.nftMasterEdition), isSigner: false, isWritable: true },
			{ pubkey: params.token ? pk(params.token) : none, isSigner: false, isWritable: !!params.token },
			{ pubkey: params.tokenRecord ? pk(params.tokenRecord) : none, isSigner: false, isWritable: !!params.tokenRecord },
			{ pubkey: pk(params.collectionDelegateRecord), isSigner: false, isWritable: false },
			{ pubkey: pk(params.collectionMint), isSigner: false, isWritable: false },
			{ pubkey: pk(params.collectionMetadata), isSigner: false, isWritable: true },
			{ pubkey: pk(params.collectionMasterEdition), isSigner: false, isWritable: false },
			{ pubkey: pk(params.collectionUpdateAuthority), isSigner: false, isWritable: false },
			{ pubkey: pk(params.tokenMetadataProgram), isSigner: false, isWritable: false },
			{ pubkey: pk(params.splTokenProgram), isSigner: false, isWritable: false },
			{ pubkey: params.splAtaProgram ? pk(params.splAtaProgram) : none, isSigner: false, isWritable: false },
			{ pubkey: pk(SYSTEM_PROGRAM_ID), isSigner: false, isWritable: false },
			{ pubkey: pk(params.sysvarInstructions), isSigner: false, isWritable: false },
			{ pubkey: pk(params.recentSlothashes), isSigner: false, isWritable: false },
			{ pubkey: params.authorizationRulesProgram ? pk(params.authorizationRulesProgram) : none, isSigner: false, isWritable: false },
			{ pubkey: params.authorizationRules ? pk(params.authorizationRules) : none, isSigner: false, isWritable: false },
			...(params.remainingAccounts || [])
		];
		const mintArgs = params.mintArgs || new Uint8Array(0);
		const enc = new TextEncoder();
		const labelOption = params.label
			? concatAll([Uint8Array.of(1), u32(enc.encode(params.label).length), enc.encode(params.label)])
			: Uint8Array.of(0);
		const data = concatAll([DISCRIMINATOR.mintV2, u32(mintArgs.length), mintArgs, labelOption]);
		return new solanaWeb3.TransactionInstruction({ programId: pk(CANDY_GUARD_PROGRAM_ID), keys, data });
	}

	return {
		CANDY_GUARD_PROGRAM_ID, GUARD_TYPE,
		findCandyGuardPda, findAllowListProofPda, findMintLimitCounterPda,
		encodeMerkleProof, encodeGuardSet, encodeCandyGuardData,
		buildInitializeInstruction, buildWrapInstruction,
		buildRouteInstruction, buildMintV2Instruction
	};
})();

</script>

<script>

let CONFIG = null;
let connection = null;
let walletPubkey = null;
let walletProvider = null;

document.getElementById("configFile").addEventListener("change", async (e) => {
	const file = e.target.files[0];
	const statusEl = document.getElementById("configStatus");
	if (!file) return;
	try {
		const text = await file.text();
		CONFIG = JSON.parse(text);
		if (!CONFIG.candyMachine || !CONFIG.candyGuard || !CONFIG.collectionMint) {
			throw new Error("This doesn't look like a mint-config.json from the admin tool — missing required fields.");
		}
		connection = new solanaWeb3.Connection(CONFIG.rpcUrl, "confirmed");
		statusEl.innerHTML = '<span class="ok">Config loaded: ' + CONFIG.candyMachine.slice(0, 8) + '... on ' + CONFIG.network + '</span>';
		renderConnectStep();
	} catch (err) {
		statusEl.innerHTML = '<span class="err">' + (err.message || String(err)) + '</span>';
	}
});

function renderConnectStep() {
	document.getElementById("content").innerHTML = `
		<div id="supplyBox" class="center">Loading supply...</div>
		<div id="phaseBox"></div>
		<button id="connectBtn">Connect Phantom</button>
		<pre id="statusOutput"></pre>
	`;
	loadSupply();
	document.getElementById("connectBtn").addEventListener("click", connectWallet);
}

async function loadSupply() {
	const box = document.getElementById("supplyBox");
	try {
		const info = await connection.getAccountInfo(new solanaWeb3.PublicKey(CONFIG.candyMachine));
		if (!info) throw new Error("Candy Machine not found on " + CONFIG.network + ".");
		const itemsAvailable = Number(info.data.readBigUInt64LE(120));
		const itemsRedeemed = Number(info.data.readBigUInt64LE(112));
		const pct = itemsAvailable > 0 ? Math.round((itemsRedeemed / itemsAvailable) * 100) : 0;
		box.innerHTML = '<div class="supply"><span class="n">' + itemsRedeemed + '</span> / ' + itemsAvailable + ' minted' +
			'<div class="bar"><div style="width:' + pct + '%"></div></div></div>';
	} catch (err) {
		box.innerHTML = '<span class="err">' + (err.message || String(err)) + '</span>';
	}
}

async function connectWallet() {
	const statusOutput = document.getElementById("statusOutput");
	if (!window.solana || !window.solana.isPhantom) {
		statusOutput.innerHTML = '<span class="err">Phantom not found. Install it and reload.</span>';
		return;
	}
	try {
		const resp = await window.solana.connect();
		walletPubkey = resp.publicKey;
		walletProvider = window.solana;
		renderMintStep();
	} catch (err) {
		statusOutput.innerHTML = '<span class="err">' + (err.message || "Connection failed.") + '</span>';
	}
}

/**
 * Finds the first group (in config order, matching on-chain guard
 * evaluation order) whose start time has passed AND whose wallet list
 * either is empty (open to anyone) or contains the connected wallet.
 */
function findEligibleGroup() {
	const nowSec = Math.floor(Date.now() / 1000);
	for (const g of CONFIG.groups) {
		if (g.startDateUnix > nowSec) continue; // not live yet
		if (g.wallets.length > 0 && !g.wallets.includes(walletPubkey.toString())) continue; // gated, not on the list
		return g;
	}
	return null;
}

function renderMintStep() {
	const group = findEligibleGroup();
	const phaseBox = document.getElementById("phaseBox");

	if (!group) {
		// Show why, using the same info a real buyer would want: is
		// there an upcoming phase they could qualify for, or are they
		// just not on any list right now.
		const nowSec = Math.floor(Date.now() / 1000);
		const upcoming = CONFIG.groups.find(g => g.startDateUnix > nowSec);
		phaseBox.innerHTML = '<div class="phase-badge ineligible">Not eligible right now</div>' +
			(upcoming ? '<p class="sub">Next phase "' + upcoming.label + '" opens ' + new Date(upcoming.startDateUnix * 1000).toLocaleString() + '</p>' : '<p class="sub">No open phase includes this wallet.</p>');
		document.getElementById("connectBtn").outerHTML = '<div class="center" style="color:var(--muted);font-family:monospace;font-size:12px;">' + walletPubkey.toString() + '</div>';
		return;
	}

	phaseBox.innerHTML = '<div class="phase-badge eligible">Eligible — phase "' + group.label + '"' +
		(group.wallets.length > 0 ? ' (whitelisted)' : ' (open)') + '</div>';

	document.getElementById("connectBtn").outerHTML =
		'<div class="center" style="color:var(--muted);font-family:monospace;font-size:12px;margin-bottom:8px;">' + walletPubkey.toString() + '</div>' +
		'<button id="mintBtn">Mint</button>';

	document.getElementById("mintBtn").addEventListener("click", () => runMint(group));
}

async function pollConfirmation(signature, lastValidBlockHeight) {
	const start = Date.now();
	while (Date.now() - start < 60000) {
		const statuses = await connection.getSignatureStatuses([signature]);
		const status = statuses && statuses.value && statuses.value[0];
		if (status) {
			if (status.err) throw new Error("Transaction failed on-chain: " + JSON.stringify(status.err));
			if (status.confirmationStatus === "confirmed" || status.confirmationStatus === "finalized") return true;
		}
		const currentHeight = await connection.getBlockHeight();
		if (currentHeight > lastValidBlockHeight) {
			const finalCheck = await connection.getSignatureStatuses([signature]);
			const finalStatus = finalCheck && finalCheck.value && finalCheck.value[0];
			if (finalStatus && !finalStatus.err) return true;
			throw new Error("Transaction expired before confirmation.");
		}
		await new Promise(r => setTimeout(r, 1500));
	}
	throw new Error("Confirmation timed out after 60s.");
}

async function runMint(group) {
	const output = document.getElementById("statusOutput");
	const mintBtn = document.getElementById("mintBtn");
	mintBtn.disabled = true;
	output.textContent = "Building transaction...";
	try {
		const remainingAccounts = [];
		const routeIxList = [];

		if (group.wallets.length > 0) {
			// CONFIRMED scheme: base58 address strings, OpenZeppelin
			// MerkleProof.sol style (no domain-separation prefix).
			const proof = RelaxMerkle.getMerkleProof(group.wallets, walletPubkey.toString(), "unprefixed");
			const routeData = RelaxCandyGuard.encodeMerkleProof(proof);
			const allowListProofPda = await RelaxCandyGuard.findAllowListProofPda({
				merkleRoot: RelaxMerkle.getMerkleRoot(group.wallets, "unprefixed"),
				minter: walletPubkey, candyGuard: CONFIG.candyGuard, candyMachine: CONFIG.candyMachine
			});
			routeIxList.push(RelaxCandyGuard.buildRouteInstruction({
				candyGuard: CONFIG.candyGuard, candyMachine: CONFIG.candyMachine, payer: walletPubkey,
				guardName: "allowList", routeData, label: group.label,
				remainingAccounts: [
					{ pubkey: allowListProofPda, isSigner: false, isWritable: true },
					{ pubkey: solanaWeb3.SystemProgram.programId, isSigner: false, isWritable: false }
				]
			}));
			remainingAccounts.push({ pubkey: allowListProofPda, isSigner: false, isWritable: false });
		}

		if (group.mintLimitId) {
			const mintLimitCounterPda = await RelaxCandyGuard.findMintLimitCounterPda({
				id: group.mintLimitId, minter: walletPubkey, candyGuard: CONFIG.candyGuard, candyMachine: CONFIG.candyMachine
			});
			remainingAccounts.push({ pubkey: mintLimitCounterPda, isSigner: false, isWritable: true });
		}

		const nftMintKeypair = solanaWeb3.Keypair.generate();
		const nftMetadata = await RelaxPdas.findMetadataPda(nftMintKeypair.publicKey);
		const nftMasterEdition = await RelaxPdas.findMasterEditionPda(nftMintKeypair.publicKey);
		const collectionMetadata = await RelaxPdas.findMetadataPda(CONFIG.collectionMint);
		const collectionMasterEdition = await RelaxPdas.findMasterEditionPda(CONFIG.collectionMint);
		const candyMachineAuthorityPda = await RelaxCandyMachine.findCandyMachineAuthorityPda(CONFIG.candyMachine);

		// NOTE: assumes the collection's update authority is the same
		// wallet that ran the admin tool (typical for a first,
		// operator-run launch). A collection with a different update
		// authority isn't handled by this page yet.
		const cmInfo = await connection.getAccountInfo(new solanaWeb3.PublicKey(CONFIG.candyMachine));
		const collectionUpdateAuthority = new solanaWeb3.PublicKey(cmInfo.data.subarray(16, 48)); // == candy machine's `authority` field, same wallet by convention here

		const collectionDelegateRecord = await RelaxCandyMachine.findCollectionDelegateRecordPda({
			collectionMint: CONFIG.collectionMint, collectionUpdateAuthority, delegate: candyMachineAuthorityPda
		});

		const MINT_SIZE = 82;
		const mintRent = await connection.getMinimumBalanceForRentExemption(MINT_SIZE);
		const splTokenProgram = new solanaWeb3.PublicKey("TokenkegQfeZyiNwAJbNbGKPFXCWuBvf9Ss623VQ5DA");
		const associatedTokenProgram = new solanaWeb3.PublicKey("ATokenGPvbdGVxr1b2hvZbsiqW5xWH25efTNsLJA8knL");

		const createMintAccountIx = solanaWeb3.SystemProgram.createAccount({
			fromPubkey: walletPubkey, newAccountPubkey: nftMintKeypair.publicKey,
			lamports: mintRent, space: MINT_SIZE, programId: splTokenProgram
		});
		const initMintData = new Uint8Array([20, 0, ...walletPubkey.toBytes(), 1, ...walletPubkey.toBytes()]);
		const initMintIx = new solanaWeb3.TransactionInstruction({
			programId: splTokenProgram,
			keys: [{ pubkey: nftMintKeypair.publicKey, isSigner: false, isWritable: true }],
			data: initMintData
		});

		const [nftTokenAccount] = await solanaWeb3.PublicKey.findProgramAddress(
			[walletPubkey.toBytes(), splTokenProgram.toBytes(), nftMintKeypair.publicKey.toBytes()],
			associatedTokenProgram
		);
		const createAtaIx = new solanaWeb3.TransactionInstruction({
			programId: associatedTokenProgram,
			keys: [
				{ pubkey: walletPubkey, isSigner: true, isWritable: true },
				{ pubkey: nftTokenAccount, isSigner: false, isWritable: true },
				{ pubkey: walletPubkey, isSigner: false, isWritable: false },
				{ pubkey: nftMintKeypair.publicKey, isSigner: false, isWritable: false },
				{ pubkey: solanaWeb3.SystemProgram.programId, isSigner: false, isWritable: false },
				{ pubkey: splTokenProgram, isSigner: false, isWritable: false }
			],
			data: Uint8Array.of(1)
		});

		const mintIx = RelaxCandyGuard.buildMintV2Instruction({
			candyGuard: CONFIG.candyGuard, candyMachine: CONFIG.candyMachine, candyMachineAuthorityPda,
			payer: walletPubkey, minter: walletPubkey,
			nftMint: nftMintKeypair.publicKey, nftMintAuthority: walletPubkey,
			nftMetadata, nftMasterEdition, token: nftTokenAccount, splAtaProgram: associatedTokenProgram,
			collectionDelegateRecord, collectionMint: CONFIG.collectionMint,
			collectionMetadata, collectionMasterEdition, collectionUpdateAuthority,
			tokenMetadataProgram: RelaxPdas.TOKEN_METADATA_PROGRAM_ID,
			splTokenProgram,
			sysvarInstructions: new solanaWeb3.PublicKey("Sysvar1nstructions1111111111111111111111111"),
			recentSlothashes: new solanaWeb3.PublicKey("SysvarS1otHashes111111111111111111111111111"),
			label: group.label,
			remainingAccounts
		});

		const { blockhash, lastValidBlockHeight } = await connection.getLatestBlockhash();
		const tx = new solanaWeb3.Transaction();
		tx.recentBlockhash = blockhash;
		tx.feePayer = walletPubkey;
		tx.add(createMintAccountIx, initMintIx, createAtaIx, ...routeIxList, mintIx);
		tx.partialSign(nftMintKeypair);

		const signedTx = await walletProvider.signTransaction(tx);
		const signature = await connection.sendRawTransaction(signedTx.serialize(), { skipPreflight: false });
		output.textContent = "Sent: " + signature + "\nWaiting for confirmation...";

		await pollConfirmation(signature, lastValidBlockHeight);

		output.innerHTML = '<span class="ok">Minted!</span>\nNFT: ' + nftMintKeypair.publicKey.toString() + '\nSignature: ' + signature;
		loadSupply();
	} catch (err) {
		output.innerHTML = '<span class="err">FAILED: ' + (err.message || String(err)) + '</span>';
		mintBtn.disabled = false;
	}
}

</script>
